<ion-header>
  <ion-toolbar color="primary">
    <ion-title>
      <ion-icon name="pie-chart" style="margin-right: 8px; vertical-align: middle;"></ion-icon>
      Bütçe Asistanı
    </ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="app-bg">
  
  <!-- Bakiye Kartı (Senin düz div'den farklı olarak mavi degrade kart) -->
  <div class="summary-card">
    <h3>Toplam Çıkan</h3>
    <h2>{{ toplamGider }} TL</h2>
  </div>

  <!-- Form Kartı -->
  <ion-card class="input-card">
    <ion-card-header>
      <ion-card-title style="font-size: 16px;">Gider Kaydet</ion-card-title>
    </ion-card-header>
    
    <ion-card-content>
      <ion-item fill="outline" class="custom-input">
        <ion-label position="floating">Gider Başlığı</ion-label>
        <ion-input [(ngModel)]="islemAdi"></ion-input>
      </ion-item>

      <ion-item fill="outline" class="custom-input">
        <ion-label position="floating">Miktar (TL)</ion-label>
        <ion-input type="number" [(ngModel)]="islemMiktari"></ion-input>
      </ion-item>

      <ion-item fill="outline" class="custom-input">
        <ion-label position="floating">Tür Seçimi</ion-label>
        <ion-select [(ngModel)]="islemTuru" interface="action-sheet">
          <ion-select-option value="Yemek">Yemek</ion-select-option>
          <ion-select-option value="Yol">Yol</ion-select-option>
          <ion-select-option value="Fatura">Fatura</ion-select-option>
          <ion-select-option value="Eğlence">Eğlence</ion-select-option>
        </ion-select>
      </ion-item>

      <ion-button expand="block" (click)="giderEkle()" class="save-btn">
        <ion-icon name="add-circle" slot="start"></ion-icon>
        Listeye Ekle
      </ion-button>
    </ion-card-content>
  </ion-card>

  <!-- Liste Başlığı -->
  <h4 class="list-heading">Kayıtlı Giderler</h4>

  <!-- Boş Durum (Seninkinden tamamen farklı bir ikon ve tasarım) -->
  <div class="empty-box" *ngIf="giderListesi.length === 0">
    <ion-icon name="folder-open-outline"></ion-icon>
    <p>Liste şu an boş, veri bekleniyor.</p>
  </div>

  <!-- Liste (Avatar destekli, çizgili yapı) -->
  <ion-list *ngIf="giderListesi.length > 0" class="list-bg">
    <ion-item-sliding *ngFor="let gider of giderListesi; let i = index">
      <ion-item lines="full" class="list-item">
        
        <!-- Yuvarlak renkli arka planı olan ikonlar -->
        <ion-avatar slot="start" [class]="renkBelirle(gider.tur)">
          <ion-icon [name]="ikonBelirle(gider.tur)"></ion-icon>
        </ion-avatar>
        
        <ion-label>
          <h2 style="font-weight: bold;">{{ gider.baslik }}</h2>
          <p>{{ gider.tur }}</p>
        </ion-label>
        
        <!-- Fiyatı gösteren Note kısmı -->
        <ion-note slot="end" color="danger" style="font-weight: bold; font-size: 16px;">
          -{{ gider.miktar }} ₺
        </ion-note>
      </ion-item>

      <ion-item-options side="end">
        <ion-item-option color="danger" (click)="silmeUyarisiniAc(i)">
          <ion-icon slot="icon-only" name="trash"></ion-icon>
        </ion-item-option>
      </ion-item-options>
    </ion-item-sliding>
  </ion-list>

  <ion-toast 
    [isOpen]="toastAcik" [message]="toastIcerik" [color]="toastRengi" 
    [duration]="2000" (didDismiss)="toastAcik = false">
  </ion-toast>

  <ion-alert
    [isOpen]="alertAcik" header="Onay" message="Bu kaydı silmek istiyor musunuz?" 
    [buttons]="alertDugmeleri" (didDismiss)="alertAcik = false">
  </ion-alert>

</ion-content>
